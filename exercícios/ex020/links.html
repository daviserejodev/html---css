<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        a{
            color: brown;
            text-decoration: none;
        }
        a:hover{
            text-decoration: underline;
            color: rgb(255, 74, 74);
        }
        a:active{
            color:aqua
        }
        a::before{
            content: "✯";
        }
        a::after{
            content: "[link]";
            text-decoration: none;
            font-weight: normal;
            color: blue;
        }
    </style>
</head>
<h1>Criando links</h1>
<ul>
    <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio Git Hub</a></li>
    <li><a href="https://youtube.com">Canal do youtube</a></li>
    <li><a href="https://discord.com/">Discord</a></li>

</ul>

</body>
</html>
