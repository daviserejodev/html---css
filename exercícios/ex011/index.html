<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em Html</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>tente abrir esse site em vários dispositivos diferentes ou simplemente aumente e diminua o tamanho de seu navegador</p>
    <picture>
        <source media="(max-width:750px )" srcset="imagens/fotos.png" type="image/png">
        <source media="(max-width:1050px )" srcset= "imagens/fotos M.png" type="image/png">
        <img src="imagens/fotos G.png" alt="imagem flexivel">
        <h1>Reproduzindo audio</h1>
        <p>Vamos a reproduzir um audio em HMTL 5</p>
        <audio src="midia/777.mp3" controls autoplay></audio>
      
    </picture>
</body>
</html>
